name: Publish

on:
  push:
    tags:
      - v*
    branches:
      - main
    paths:
      - 'controller/**'
      - 'modules/**'
      - 'scripts/**'
      - '.github/**'

jobs:
  build-and-push-controller:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    secrets: inherit 
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run Build and Publish Docker image
        id: controller
        uses: ./.github/actions/docker-push
        with:
          image-name: controller
          tag-name: ${{ github.ref_name }}
          working-directory: controller
          platforms: ''

  build-and-push-devices:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [raspberrypi3b, raspberrypi5]
        device: [DHT11]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run Build and Publish Docker image
        id: devices
        uses: ./.github/actions/docker-push
        with:
          image-name: device/${{ matrix.device }}
          tag-name: ${{ github.ref_name }}-${{ matrix.module }}
          working-directory: modules/${{ matrix.module }}/devices/${{ matrix.device }}
          platforms: linux/arm64